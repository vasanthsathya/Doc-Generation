# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Optionally build in additional formats
formats:
  - epub
  - htmlzip

# Python dependencies
python:
  install:
    - requirements: requirements.txt

