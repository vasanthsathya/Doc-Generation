---

- name: Create telemetry directory on nodes
  ansible.builtin.file:
    path: "{{ omnia_telemetry_dest }}"
    state: directory
    mode: "{{ directory_permissions }}"

- name: Transfer all binaries to compute nodes
  ansible.builtin.copy:
    src: "{{ binary_files_path }}"
    dest: "{{ omnia_telemetry_dest }}"
    force: false
    owner: root
    group: root
    mode: "{{ binary_mode }}"

- name: Update telemetry ini file
  delegate_to: localhost
  run_once: true
  ansible.builtin.lineinfile:
    path: "{{ init_file_path }}"
    regexp: "{{ item }}:(.*)$"
    line: "{{ item }}={{ hostvars['127.0.0.1'][item] | lower }}"
  with_items:
    - omnia_telemetry_collection_interval
    - collect_regular_metrics
    - collect_health_check_metrics
    - collect_gpu_metrics
    - fuzzy_offset
    - metric_collection_timeout

- name: Transfer ini file
  ansible.builtin.copy:
    src: "{{ init_file_path }}"
    dest: "{{ omnia_telemetry_dest }}"
    mode: "{{ ini_file_mode }}"
    force: true
